<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泛舟工作室 | Fanzhou Studio</title>
    <style>
        /* 样式重置与核心布局 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #0a0a0a; /* 极简黑 */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 渐入动画 */
        .container {
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 1.5s ease-out forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 文字样式 */
        h1 {
            font-size: 3rem;
            letter-spacing: 8px;
            margin-bottom: 10px;
            font-weight: 300;
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            color: #888;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        /* 装饰线 */
        .line {
            width: 50px;
            height: 1px;
            background-color: #444;
            margin: 20px auto;
        }

        /* 按钮样式 */
        .btn {
            display: inline-block;
            padding: 12px 30px;
            border: 1px solid #ffffff;
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .btn:hover {
            background-color: #ffffff;
            color: #000000;
        }

        /* 背景装饰微动效 */
        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 70%);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>泛舟工作室</h1>
        <p style="color: #fff; font-style: italic; opacity: 0.9;">“志在以游为舟，载山海入梦”</p>
        
        <div class="line"></div>
        
        <div style="max-width: 600px; margin: 0 auto; text-align: left; line-height: 1.8; color: #aaa; font-size: 0.95rem;">
            <p>我们是一群热爱中式奇幻文化的开发者，目前正全力投入于<strong>写实风格《山海经》主题开放世界 ARPG</strong> 的研发。</p>
            <p>在大作打磨期间，我们会不定期分享一些轻量级、富有趣味性的闯关小品，作为技术尝试与灵感碰撞的产物。期待与你一同见证山海世界的诞生。</p>
        </div>

        <div style="margin-top: 40px;">
            <a href="https://www.taptap.cn/developer/280143" class="btn" target="_blank">
                前往 TapTap 见证山海
            </a>
        </div>
    </div>

</body>
</html>
